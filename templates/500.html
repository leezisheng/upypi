{% extends "base.html" %}

{% block title %}{% trans %}服务器错误{% endtrans %}{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 text-muted">500</h1>
    <h2 class="mb-4">{% trans %}抱歉，服务器遇到了问题。请稍后再试。{% endtrans %}</h2>
    <div class="d-flex justify-content-center gap-3">
        <a href="javascript:location.reload()" class="btn btn-outline-primary"><i class="bi bi-arrow-clockwise"></i> {% trans %}刷新页面{% endtrans %}</a>
    </div>
</div>
{% endblock %}
